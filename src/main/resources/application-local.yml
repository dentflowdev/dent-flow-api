spring:
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    hikari:
      maximum-pool-size: 5
      minimum-idle: 1
      connection-timeout: 30000

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: update        # auto create/update tables locally
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  # Upstash Redis — paste your rediss:// URL here for local dev
  # Format: rediss://default:<password>@<host>:<port>
  data:
    redis:
      url: ${REDIS_URL}

jwt:
  secret: ${JWT_SECRET}
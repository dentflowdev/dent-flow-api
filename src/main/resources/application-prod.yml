spring:
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    hikari:
      maximum-pool-size: 5        # free tier has connection limits, keep this low
      minimum-idle: 1
      connection-timeout: 30000
      idle-timeout: 300000        # reduce to 5 min (was 10) — drop idle before Supabase does
      max-lifetime: 600000        # 10 min max connection lifetime
      keepalive-time: 60000       # ping every 60s to keep connection alive
      connection-test-query: SELECT 1   # validate connection on borrow

  jpa:
    hibernate:
      ddl-auto: validate      # never update in prod
    show-sql: false
    properties:
      hibernate:
        format_sql: false
        dialect: org.hibernate.dialect.PostgreSQLDialect
        connection:
          provider_disables_autocommit: false

jwt:
  secret: ${JWT_SECRET}


spring:
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    hikari:
      maximum-pool-size: 5        # free tier has connection limits, keep this low
      minimum-idle: 1
      connection-timeout: 30000
      idle-timeout: 180000        # 3 min — drop idle before Supabase/PgBouncer does (5 min)
      max-lifetime: 300000        # 5 min — recycle connections before PgBouncer kills them
      keepalive-time: 60000       # ping every 60s to keep connection alive
      connection-test-query: SELECT 1   # validate connection on borrow
      leak-detection-threshold: 60000   # warn if connection held > 60s (detects stuck connections)

  jpa:
    open-in-view: false       # prevents DB connection being held for entire SSE request duration
    hibernate:
      ddl-auto: validate      # never update in prod
    show-sql: false
    properties:
      hibernate:
        format_sql: false
        dialect: org.hibernate.dialect.PostgreSQLDialect
        connection:
          provider_disables_autocommit: false

  # Upstash Redis — set REDIS_URL env var in your prod deployment
  data:
    redis:
      url: ${REDIS_URL}

jwt:
  secret: ${JWT_SECRET}


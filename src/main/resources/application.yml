spring:
  profiles:
    active: ${SPRING_PROFILES_ACTIVE}

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

  # Redis (Upstash) — used for SSE Pub/Sub broadcasting only (not as a data store)
  data:
    redis:
      url: ${REDIS_URL}
      repositories:
        enabled: false   # prevents Spring Data from scanning JPA repos as Redis repos

  # Mail Configuration (for OTP emails)
  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
          connectiontimeout: 5000
          timeout: 5000
          writetimeout: 5000

jwt:
  secret: ${JWT_SECRET}
  access-token-expiry: 3600000
  refresh-token-expiry: 7776000000

# OTP Configuration
otp:
  expiry-minutes: 5      # OTP valid for 5 minutes
  max-attempts: 3        # Max 3 wrong attempts before expiry

# Password Reset Configuration
password-reset:
  token-expiry-minutes: 60  # Reset token valid for 1 hour

app:
  gcs:
    bucket-name: dent-flow-images
  name: ${APP_NAME:Dental Management}

server:
  port: ${PORT:8080}
  error:
    include-message: never

logging:
  level:
    package com.dentalManagement.dentalFlowBackend: INFO
    org.springframework.security: WARN
    org.hibernate.SQL: WARN
    org.hibernate.orm.jdbc.bind: WARN

